<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PET_OS | 视觉测试页面</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #ec4899;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.15) 0%, transparent 40%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 600px;
            text-align: center;
            z-index: 10;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .glass-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }

        p {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            padding: 6px 16px;
            border-radius: 99px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 24px;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 12px #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .action-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .action-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.5);
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .mascot-container {
            margin-top: 40px;
            position: relative;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mascot-placeholder {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #f472b6, #fb7185);
            border-radius: 20px;
            animation: float 3s ease-in-out infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .interactive-area {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--glass-border);
        }

        #counter {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            margin-bottom: 12px;
        }

        /* 底部装饰 */
        .decoration {
            position: absolute;
            bottom: -50px;
            width: 100%;
            height: 200px;
            background: linear-gradient(to top, var(--primary), transparent);
            opacity: 0.1;
            filter: blur(100px);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-badge">
            <span class="status-dot"></span>
            系统运行中 · System Online
        </div>
        
        <div class="glass-card">
            <h1>PET_OS Test</h1>
            <p>这是一个实时响应的视觉测试页面。在这里你可以测试组件的交互、动画以及响应式布局。极简、专业、设计师级别。</p>
            
            <div id="counter">0</div>
            
            <div class="interactive-area">
                <button class="action-btn" onclick="increment()">点击增加能量</button>
            </div>

            <div class="mascot-container">
                <div class="mascot-placeholder" id="mascot">🐱</div>
            </div>
        </div>
    </div>

    <div class="decoration"></div>

    <script>
        let count = 0;
        const emojis = ['🐱', '🐶', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁'];

        function increment() {
            count++;
            document.getElementById('counter').innerText = count;
            
            // 改变吉祥物
            const mascot = document.getElementById('mascot');
            mascot.innerText = emojis[count % emojis.length];
            
            // 简单的震动效果
            mascot.style.animation = 'none';
            mascot.offsetHeight; // 触发重绘
            mascot.style.animation = 'float 3s ease-in-out infinite';
            
            // 按钮点击效果
            confetti();
        }

        function confetti() {
            // 这里可以添加更复杂的粒子效果
            console.log('Energy level: ' + count);
        }
    </script>
</body>
</html>
